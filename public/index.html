<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Throughline</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="hdr-top">
      <a href="#/" class="hdr-top-left" aria-label="Throughline home">
        <span class="hdr-badge">Throughline</span>
        <span class="hdr-meta" id="hdr-meta"></span>
      </a>
      <div class="hdr-top-right">
        <div class="topbar-status" id="status" aria-live="polite"></div>
        <button class="hdr-settings" id="hdr-settings" aria-label="Settings" title="Settings">⚙</button>
      </div>
    </header>

    <main id="main"></main>

    <!-- Drawer overlay (entry detail / composer). -->
    <div class="drawer-shroud" id="drawer-shroud" hidden></div>
    <aside
      class="drawer"
      id="drawer"
      aria-hidden="true"
      aria-label="Entry detail"
      hidden
    ></aside>

    <!-- Modal overlay (new project / reference file, close-action confirm). -->
    <div class="modal-shroud" id="modal-shroud" hidden>
      <div class="modal" id="modal" role="dialog" aria-modal="true"></div>
    </div>

    <!-- Triage overlay (AI-assisted ingestion: clusters → projects → commit). -->
    <div class="triage-shroud" id="triage-shroud" hidden>
      <div class="triage" id="triage" role="dialog" aria-modal="true" aria-label="Entry triage"></div>
    </div>

    <!-- Consult chat overlay (T13: native gpt-5.4 consult). Layers ABOVE the
         triage overlay — the triage draft stays alive underneath. -->
    <div class="chat-shroud" id="chat-shroud" hidden>
      <div class="chat-panel" id="chat-panel" role="dialog" aria-modal="true" aria-label="Consult chat"></div>
    </div>

    <!-- Workspace shell (meridian-os medical-director layout): a slim tab strip
         + ＋Add menu + Projects/People toggle, then a left card list (own scroll)
         beside a right detail panel (own scroll). The project list is always
         visible; a clicked card / the home tabs fill the right panel. -->
    <template id="tpl-workspace">
      <div class="workspace">
        <div class="ws-bar">
          <div class="ws-tabs" id="ws-tabs" role="tablist"></div>
          <div class="ws-bar-right">
            <div class="add-wrap">
              <button class="btn primary add-btn" id="ws-add-btn" aria-haspopup="true">＋ Add ▾</button>
              <div class="add-menu" id="ws-add-menu" role="menu" hidden>
                <button data-act="new-project-guided" role="menuitem">✦ New project</button>
                <button data-act="new-program" role="menuitem">New program</button>
                <button data-act="new-reference-file" role="menuitem">New reference file</button>
                <div class="add-sep" aria-hidden="true"></div>
                <button data-act="new-adhoc" role="menuitem">✎ Ad-hoc note</button>
                <button data-act="import-file" role="menuitem">⤓ Import .md…</button>
                <button data-act="paste-copilot" role="menuitem">📋 Paste from Copilot</button>
              </div>
            </div>
            <div class="view-toggle" id="home-view-toggle" role="tablist">
              <button class="vtbtn" data-view="projects">▦&nbsp; Projects</button>
              <button class="vtbtn" data-view="people">People</button>
            </div>
          </div>
        </div>
        <div class="ws-split">
          <aside class="ws-left" id="ws-left"></aside>
          <section class="ws-right" id="ws-right"></section>
        </div>
      </div>
    </template>

    <template id="tpl-project">
      <section class="project">
        <div class="panel-hdr">
          <a href="#/" class="back-btn" id="project-back-link">← Back</a>
          <span class="panel-emoji" id="project-emoji" hidden></span>
          <div class="panel-hdr-id">
            <div class="panel-title" id="project-title"></div>
            <div class="panel-sub" id="project-sub"></div>
          </div>
          <div class="tab-group" id="project-tabs" hidden>
            <button class="tab-btn" data-ptab="overview">Overview</button>
            <button class="tab-btn" data-ptab="entries">Entries</button>
          </div>
          <button class="btn ghost light" data-act="edit-project">Edit</button>
        </div>

        <div class="project-subhead">
          <p class="project-tagline" id="project-tagline"></p>
          <div class="project-tags" id="project-tags"></div>
          <details class="project-summary" id="project-summary-details" hidden>
            <summary>Summary</summary>
            <div class="prose" id="project-summary-body"></div>
          </details>
          <div class="folder-lens" id="project-folder"></div>
        </div>

        <div id="project-tabbody"></div>
      </section>
    </template>

    <template id="tpl-project-entries">
      <div class="project-body">
        <div class="entry-pane">
          <div class="entry-pane-head">
            <h2>Entries</h2>
            <button class="btn primary" data-act="new-entry">
              New entry
            </button>
          </div>
          <div class="entry-stack" id="entry-stack"></div>
        </div>

        <aside class="action-rail">
          <div class="rail-head">
            <h2>Open actions</h2>
            <div class="rail-counters" id="rail-counters"></div>
          </div>
          <div class="rail-list" id="rail-list"></div>
        </aside>
      </div>
    </template>

    <template id="tpl-empty-home">
      <div class="empty">
        <p>No projects or reference files yet.</p>
        <p class="muted">
          Start by adding the first one. A <em>project</em> has a goal; a
          <em>reference file</em> has a purpose.
        </p>
      </div>
    </template>

    <template id="tpl-empty-rail">
      <div class="empty muted small">
        Nothing open here yet. Add an action inside an entry and it will land
        here.
      </div>
    </template>

    <template id="tpl-empty-entries">
      <div class="empty muted">
        No entries yet. Click <strong>New entry</strong> above to record a
        meeting, an email, or a freetext note.
      </div>
    </template>

    <script type="module" src="/app.js"></script>
  </body>
</html>
